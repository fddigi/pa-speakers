# Konfiguration for RCF ART PA-overvågning
# Se pa-monitor-claude-code-prompt_1.md for den fulde opgavebeskrivelse.

sources:
  kleinanzeigen: true
  blocket: true
  reverb: true
  thomann: true
  dba: true
  gearloop: true  # F11-spike: svensk brugtmarkedsplads, samme SE-marked som Blocket
  # F4: eBay.de -- kræver EBAY_APP_ID/EBAY_CERT_ID i .env (se README.md). Uden dem
  # logger kilden og springes gracefully over hver køring (main.py fejler ikke).
  ebay: true

# F7: per-kilde min-interval (timer) -- launchd/"Kør nu" kan trigge alle kilder
# hyppigt, men Kleinanzeigen/Blocket øger blokeringsrisiko ved for tit hentning.
# Kilder der ikke er nævnt her har ingen min-interval (kører hver gang de er
# aktiveret). Ignoreres altid ved `--source <navn>` (manuel fejlsøgning).
sources_min_interval_hours:
  kleinanzeigen: 4
  blocket: 4

search_terms:
  primary:
    - "RCF ART 910"
    - "RCF ART 710"
    - "RCF ART 708"
  secondary:
    - "RCF SUB 705"
    - "RCF ART 712"
    # Yamaha DXR-serien: konkurrerende 2-vejs powered hoejttalere til RCF ART.
    # Ingen statiske pris-taerskler endnu (se classify.py/config nedenfor) --
    # klassificeres dynamisk (25./75. percentil) naar der er nok historik,
    # ellers UKENDT, samme moenster som RCF SUB 705/ART 712.
    - "Yamaha DXR8"
    - "Yamaha DXR10"
    - "Yamaha DXR12"
    - "Yamaha DXR15"

# Thomann B-Stock: per-model produkt-URL'er 404'er naar der ikke er B-Stock paa lager
# (bekraeftet ved research 2026-07-07), saa de er IKKE en stabil pollemaal. I stedet
# polles den samlede RCF-kategoriside, som altid findes og lister B-Stock-varianter
# naar de er paa lager. Se sources/thomann.py.
thomann_category_url: "https://www.thomann.dk/rcf_aktive_fullrange_hoejttalere.html"

# F3 (BACKLOG.md): Reverb er domineret af amerikanske forhandlere der saelger nyt/
# open-box til naesten-nypris -- det oversvoemmer boardet med FAIR/OVERPRISET og
# forurener percentilerne i den dynamiske klassifikation. condition filtrerer vaek
# fabriksnyt ved kilden (API-parameter, verificeret 2026-07-08: 170 -> 24 raa
# annoncer). exclude_origin_countries dropper annoncer med INFERRED oprindelse i
# disse lande -- testet tom pr. 2026-07-08: Reverb havde 0 bekraeftede EU-brugte
# annoncer for vores modeller den dag (kun US+ukendt), saa US-udelukkelse ville
# have reduceret Reverb til 3 annoncer. Landed cost (fragt+told+moms) laegges
# allerede korrekt oveni US-priser, og dynamisk percentil-klassifikation haandterer
# resten -- saa US beholdes. Saet fx ["US"] her hvis det senere viser sig noedvendigt.
reverb:
  condition: "used"
  exclude_origin_countries: []

currency:
  eur_dkk: 7.46
  sek_dkk: 0.70
  usd_dkk: 6.90

# Import-omkostninger for annoncer fra saelgere UDENFOR EU/EOES (primaert Reverb-
# saelgere i USA/UK). Bruges til at beregne en "landed cost" (reel slutpris i DKK)
# saa priser kan sammenlignes retfaerdigt paa tvaers af graenser. Se
# sources/reverb.py: Reverbs API opgiver typisk KUN indenlandsk USA-fragt (US_CON) --
# international fragt til DK er "beregnes individuelt", saa vi bruger et estimat.
# ADVARSEL: duty_pct er et estimat for hoejttalere (HS-kode 8518) -- jeg kunne IKKE
# bekraefte den praecise EU TARIC-sats ved research. Tjek toldst.dk eller EU's TARIC-
# database foer du stoler paa dette til en koebsbeslutning.
import_costs:
  vat_pct: 25                      # dansk moms, gaelder ALT fra ikke-EU uanset vaerdi
  duty_threshold_eur: 150          # under denne vaerdi (vare, ekskl. fragt): ingen told
  duty_pct: 4.5                    # ESTIMAT for hoejttalere -- IKKE bekraeftet praecist
  default_shipping_dkk: 800        # bruges naar Reverb ikke opgiver en international fragtpris
  eu_country_codes:                # saelgere fra disse lande: ingen told/import-moms
    - DK
    - DE
    - SE
    - AT
    - BE
    - BG
    - HR
    - CY
    - CZ
    - EE
    - ES
    - FI
    - FR
    - GR
    - HU
    - IE
    - IT
    - LT
    - LU
    - LV
    - MT
    - NL
    - PL
    - PT
    - RO
    - SI
    - SK

# Pris-tærskler i DKK, par-priser. Enkeltenhed halveres + 10% i classify.py.
thresholds:
  708a_mk4:
    godt_koeb_max: 2800
    fair_min: 3000
    fair_max: 3800
    overpriced_min: 4200
  708a_mk5:
    godt_koeb_max: 3800
    fair_min: 3800
    fair_max: 4800
    overpriced_min: 5200
  710a_mk2_mk3:
    godt_koeb_max: 3000
    fair_min: 3000
    fair_max: 4000
    overpriced_min: 4500
  710a_mk4:
    godt_koeb_max: 3800
    fair_min: 3800
    fair_max: 4800
    overpriced_min: 5500
  710a_mk5:
    godt_koeb_max: 4800
    fair_min: 4800
    fair_max: 6000
    overpriced_min: 6500
  910a:
    godt_koeb_max: 6500
    fair_min: 6500
    fair_max: 7500
    overpriced_min: 8000

# 710-A MK1 er en beater-model: kun GODT KØB under denne pargrænse, ellers OVERPRISET.
mk1_beater:
  godt_koeb_max: 2500

# F9-udvidelse (2026-07-14): kategorien "Studio sub" fik model-genkendelse i
# normalize.py (MODEL_PATTERNS) og egne enkeltenheds-tærskler her -- se
# FEATURES.md F9's "Ærlig vurdering" (interpretation b). I MODSÆTNING til
# `thresholds` ovenfor er disse ENKELTENHEDS-priser, ikke par-priser: studio-
# subs sælges typisk enkeltvis, så classify.py bruger price_per_unit_dkk
# direkte uden SINGLE_UNIT_PENALTY/par-halvering.
studio_sub_thresholds:
  genelec_7050c:
    godt_koeb_max: 4000
    fair_min: 4000
    fair_max: 5000
    overpriced_min: 5500
  # Bogstavløs "Genelec 7050" (sælger har ikke angivet B eller C) -- ukendt
  # revision, vidt forskellig værdi/integration. Konservativt sat til B's
  # (laveste) tærskler, indtil revisionen er afklaret med sælger -- se
  # classify.py:STUDIO_SUB_NOTES.
  genelec_7050_unknown:
    godt_koeb_max: 2000
    fair_min: 2000
    fair_max: 2500
    overpriced_min: 2500
  genelec_7050b:
    godt_koeb_max: 2000
    fair_min: 2000
    fair_max: 2500
    overpriced_min: 2500
  genelec_7040a:
    godt_koeb_max: 2800
    fair_min: 2800
    fair_max: 3500
    overpriced_min: 4000
  genelec_7350a:
    godt_koeb_max: 5000
    fair_min: 5000
    fair_max: 6500
    overpriced_min: 7000
  dynaudio_9s:
    godt_koeb_max: 3500
    fair_min: 3500
    fair_max: 4500
    overpriced_min: 5000
  # BM9S er FORGÆNGEREN til 9S og markant mindre værd -- halverede tærskler
  # (jf. classify.py:STUDIO_SUB_NOTES).
  dynaudio_bm9s:
    godt_koeb_max: 1750
    fair_min: 1750
    fair_max: 2250
    overpriced_min: 2500
  svs_sb1000_pro:
    godt_koeb_max: 2800
    fair_min: 2800
    fair_max: 3500
    overpriced_min: 4000
  # Uden "Pro": ingen app-PEQ/variabel crossover -- lavere tærskler.
  svs_sb1000_nonpro:
    godt_koeb_max: 1800
    fair_min: 1800
    fair_max: 2300
    overpriced_min: 2800

  # Udvidet søgefelt (2026-07-22): resten af Fase 4-kandidaterne. Tærsklerne
  # her er ESTIMERET ud fra nypris + typisk brugtmarked-nedskrivning (50-60%)
  # -- IKKE bekræftet mod faktiske DK/DE-annoncer som de oprindelige 6 mål.
  # Justér når de første reelle hits kommer ind.
  kef_kc62:
    godt_koeb_max: 4000
    fair_min: 4000
    fair_max: 5500
    overpriced_min: 6500
  krk_s10_4:
    godt_koeb_max: 1200
    fair_min: 1200
    fair_max: 1800
    overpriced_min: 2200
  adam_sub10:
    godt_koeb_max: 3500
    fair_min: 3500
    fair_max: 4800
    overpriced_min: 5500
  # Eneste kandidat med (potentiel) mikrofonbaseret rumkorrektion (MA1) --
  # dyrere end brugerens oprindelige 6.000 kr-loft, bevidst medtaget som
  # "stræk-køb" givet den adresserer rummode-fundet fra Fase 3 direkte.
  neumann_kh750:
    godt_koeb_max: 6000
    fair_min: 6000
    fair_max: 8000
    overpriced_min: 9000
  eve_ts107:
    godt_koeb_max: 1500
    fair_min: 1500
    fair_max: 2200
    overpriced_min: 2600
  eve_ts108:
    godt_koeb_max: 2200
    fair_min: 2200
    fair_max: 3200
    overpriced_min: 3800
  kali_ws12:
    godt_koeb_max: 1800
    fair_min: 1800
    fair_max: 2600
    overpriced_min: 3000
  # RCF SUB 702-AS: PA-arvet kandidat, eksplicit ønsket. Nypris ~5.500-6.500
  # DKK (MK3, Thomann US/UK) -- tærskler estimeret ud fra samme
  # nedskrivningslogik som resten af denne sektion, IKKE fra brugerens egen
  # 2-års erfaring med SUB 705-AS II (større model, anden prisklasse).
  rcf_sub702as:
    godt_koeb_max: 2500
    fair_min: 2500
    fair_max: 3500
    overpriced_min: 4200

# F6: "Blandet par"-alarm -- to billige singler af samme model+generation kan
# tilsammen ramme par-prismålet (thresholds.<key>.godt_koeb_max), selvom ingen
# enkelt annonce gør det alene. Se scraper/scraper/pairs.py.
mixed_pair:
  same_region_only: true   # par kun mellem singler fra samme region (EU/EU, eller samme ikke-EU-land) -- undgår dobbelt international fragt
  near_miss_pct: 15        # vis også par op til 15% over mål, ikke kun par der rammer det

# Prioritetsrækkefølge ved sortering af flere samtidige hits (lavere tal = højere prioritet)
priority_order:
  - key: "910a"
    max_price: 6500
  - key: "710a_mk4"
    max_price: 3800
  - key: "710a_mk3"
    max_price: 3500
  - key: "708a"
    max_price: null

playwright:
  # true = ingen synlige Chrome-vinduer. Playwright 1.61+ bruger automatisk
  # Chromiums nye ("headless=new") tilstand ved headless=true, som er markant
  # sværere at fingeraftrykke/opdage end den gamle headless-tilstand -- saa
  # dette bor ikke oege blokeringsrisikoen naevnevaerdigt. Sat til true efter
  # klage over popping Chrome-vinduer paa homelab-maskinen.
  headless: true
  min_delay_s: 3
  max_delay_s: 8
  # F1 (BACKLOG.md): max_pages_per_run var et samlet budget paa tvaers af ALLE
  # soegetermer, saa vi reelt kun hentede side 1 pr. term. Nu pr.-term + et separat
  # samlet loft som noedbremse.
  max_pages_per_term: 3
  # Haevet fra 20 -> 50 (2026-07-22): "Studio sub"-kategoriens udvidelse bragte
  # det samlede antal soegetermer op paa 27 (fra oprindeligt ~9) -- DBA og
  # Gearloop naaede at loebe toer for budget FOER de naaede de nyeste 7-8
  # modeller i listen, saa de reelt aldrig blev soegt. 50 giver rigelig margin
  # til fortsat vaekst i soegefeltet uden at fjerne noedbremsen helt.
  max_pages_total: 50

# Genbruges af sources/thomann.py's egen separate sqlite3-forbindelse (B-Stock
# lagerstatus-tabel) -- peger bevidst paa SAMME fil som .env's LOCAL_SQLITE_PATH
# (scraper_core.LocalStore), saa der kun er ét lokalt datafil, ikke to spredte.
# log_path er ikke brugt her -- logging_setup.py (scraper_core) styrer logging.
db_path: "./data/local.db"
