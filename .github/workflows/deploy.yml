name: Deploy

# Runs on every push to main. Deploys BOTH the Cloudflare Worker and the
# GitHub Pages frontend (frontend/).
#
# GitHub Pages note (see Fund 19 in the PA SPEAKERS migration findings):
# classic branch+path Pages serving does NOT work here - GitHub's Pages API
# only accepts source.path "/" or "/docs", never an arbitrary folder like
# "/frontend" (confirmed via a real 422 "Invalid property /source/path").
# This uses the Actions-based deployment method instead (actions/deploy-pages),
# which can publish any directory regardless of its path in the repo. IMPORTANT:
# the Pages site itself must still be enabled ONCE, manually, via Settings ->
# Pages -> Build and deployment -> Source: "GitHub Actions" - this specific
# admin action returns 403 for the repo's own GITHUB_TOKEN no matter what
# `permissions:` are declared (confirmed: same 403 for both the classic and
# build_type=workflow variants of `POST /repos/{owner}/{repo}/pages`; only a
# real user/PAT credential can create the Pages site). The deploy-pages job
# below only PUBLISHES to an already-enabled site - that part works fine with
# the ordinary GITHUB_TOKEN.
#
# Uses repo secrets CF_WORKER_NAME (written by provision.sh) and the
# organization-level CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --name "${{ secrets.CF_WORKER_NAME }}"

  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4
