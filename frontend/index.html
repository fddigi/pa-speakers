<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>PA Speakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d24;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --good: #15803d;
      --good-bg: #dcfce7;
      --fair: #7a5806;
      --fair-bg: #fef3c7;
      --bad: #b91c1c;
      --bad-bg: #fee2e2;
      --unknown: #4b5563;
      --unknown-bg: #e5e7eb;
      --radius: 8px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161a;
        --surface: #1c1f26;
        --border: #2c303a;
        --text: #e7e9ee;
        --text-muted: #9aa1ad;
        --accent: #5b8def;
        --accent-hover: #7ba3f2;
        --good: #4ade80;
        --good-bg: #14301f;
        --fair: #fbbf24;
        --fair-bg: #33280a;
        --bad: #f87171;
        --bad-bg: #3a1414;
        --unknown: #9aa1ad;
        --unknown-bg: #262a32;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(0, 0, 0, 0.4);
      }
    }

    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 0 48px;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 0;
    }

    header.topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    header.topbar h1 {
      font-size: 1.35rem;
      margin: 0;
      font-weight: 650;
    }
    .whoami-line {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--unknown-bg);
      color: var(--unknown);
    }
    .status-pill::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-pill.busy { background: var(--fair-bg); color: var(--fair); }
    .status-pill.err { background: var(--bad-bg); color: var(--bad); }
    .status-pill.ok { background: var(--good-bg); color: var(--good); }
    .run-banner {
      margin: 0;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .run-banner.info { background: var(--good-bg); color: var(--good); }
    .run-banner.warn { background: var(--fair-bg); color: var(--fair); }

    button, input[type=text] {
      font: inherit;
      font-size: 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 7px 11px;
    }
    button {
      cursor: pointer;
      border-color: var(--border);
      transition: background-color 0.12s ease, border-color 0.12s ease;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { cursor: default; opacity: 0.6; border-color: var(--border); color: var(--text-muted); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
    button.subtle { background: transparent; border-color: transparent; color: var(--text-muted); padding: 4px 8px; }
    button.subtle:hover { color: var(--bad); }
    input[type=text]:focus, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    /* Stats bar - chips double as classification filters (click to toggle) */
    .stats-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
    }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; }
    .last-updated { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--unknown-bg);
      color: var(--unknown);
      border: 2px solid transparent;
    }
    .stat strong { font-size: 0.95rem; }
    .stat.total { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
    .stat[data-class="GODT KØB"] { background: var(--good-bg); color: var(--good); }
    .stat[data-class="FAIR"] { background: var(--fair-bg); color: var(--fair); }
    .stat[data-class="OVERPRISET"] { background: var(--bad-bg); color: var(--bad); }
    .stat.active { border-color: currentColor; }
    .stat:hover { filter: brightness(0.97); }

    /* Search terms */
    details#search-terms-section summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 0.9rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    details#search-terms-section summary::-webkit-details-marker { display: none; }
    details#search-terms-section summary::before {
      content: "▸";
      display: inline-block;
      transition: transform 0.15s ease;
      color: var(--text-muted);
    }
    details#search-terms-section[open] summary::before { transform: rotate(90deg); }
    .search-terms-body { padding: 0 16px 16px; }
    .hint-text { font-size: 0.8rem; color: var(--text-muted); margin: -4px 0 12px; }
    .term-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; padding: 0; list-style: none; }
    .term-chips li {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 6px 5px 12px;
      font-size: 0.82rem;
    }
    .term-chips li button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 999px;
      line-height: 1;
      font-size: 0.9rem;
    }
    .term-chips li button:hover { background: var(--bad-bg); color: var(--bad); }
    #search-terms-form { display: flex; gap: 8px; }
    #search-terms-form input { flex: 1; max-width: 320px; }

    /* Filters */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
    }
    .controls input[type=text] { min-width: 220px; flex: 1; }

    /* Table */
    .table-scroll {
      overflow-x: auto;
      border-radius: var(--radius);
    }
    table { border-collapse: collapse; width: 100%; font-size: 0.83rem; white-space: nowrap; }
    thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      padding: 0;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    thead th button {
      all: unset;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 10px 14px;
      cursor: pointer;
      color: var(--text-muted);
      font: inherit;
      font-weight: 600;
    }
    thead th button:hover { color: var(--accent); }
    thead th button:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .sort-indicator { font-size: 0.65rem; }
    tbody td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: var(--bg); }
    tbody tr:last-child td { border-bottom: none; }
    a.row-link { color: var(--text); text-decoration: none; }
    a.row-link:hover { color: var(--accent); text-decoration: underline; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .badge[data-class="GODT KØB"] { background: var(--good-bg); color: var(--good); }
    .badge[data-class="FAIR"] { background: var(--fair-bg); color: var(--fair); }
    .badge[data-class="OVERPRISET"] { background: var(--bad-bg); color: var(--bad); }
    .badge[data-class="UKENDT"] { background: var(--unknown-bg); color: var(--unknown); }
    .new-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      vertical-align: middle;
    }

    #count-line { padding: 12px 16px; font-size: 0.8rem; color: var(--text-muted); }
    .error-text { color: var(--bad); font-size: 0.85rem; padding: 0 16px; }
    .empty-state { padding: 40px 16px; text-align: center; color: var(--text-muted); }

    /* Mobile: table -> stacked cards. Each <tr> becomes a card, each <td> a
       labelled row within it (data-label supplies the label via ::before) -
       keeps price/link reachable without horizontal scrolling. */
    @media (max-width: 640px) {
      .table-scroll { overflow-x: visible; }
      table, thead, tbody, tr, td { display: block; width: 100%; }
      /* Standard visually-hidden technique (not off-screen positioning, which
         can inflate the document's scrollable width) - keeps <thead> in the
         accessibility tree for screen readers' table semantics while hiding
         it visually in favor of the data-label cards below. */
      thead {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      tbody tr {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin: 10px;
        padding: 4px 12px;
        background: var(--surface);
      }
      tbody tr:hover { background: var(--surface); }
      tbody td {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        padding: 7px 0;
        border-bottom: 1px dashed var(--border);
        white-space: normal;
        text-align: right;
      }
      tbody tr td:last-child { border-bottom: none; }
      tbody td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-muted);
        text-align: left;
        flex-shrink: 0;
      }
      tbody td[data-label="Klassifikation"] { justify-content: flex-start; }
      tbody td[data-label="Klassifikation"]::before { display: none; }
      tbody td[data-label="Titel"] { text-align: left; }
      .empty-state { text-align: center; display: block; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1>RCF ART / Yamaha DXR PA-speakers</h1>
      <div class="topbar-actions">
        <span id="status-pill" class="status-pill">–</span>
        <button id="run-now-btn" class="primary">Kør nu</button>
        <div class="whoami-line">
          Logget ind som <strong id="whoami">...</strong>
          <button id="logout" class="subtle">Log ud</button>
        </div>
      </div>
    </header>

    <div class="card" id="run-banner-card" style="display: none">
      <p id="run-banner" class="run-banner"></p>
    </div>

    <div class="card">
      <div class="stats-header">
        <div class="stats" id="stats-bar"></div>
        <span id="last-updated" class="last-updated"></span>
      </div>
    </div>

    <details class="card" id="search-terms-section">
      <summary>Hvad scraperen leder efter</summary>
      <div class="search-terms-body">
        <p class="hint-text">
          Dette er IKKE et filter for listen nedenfor - det styrer hvad scraperen
          søger efter på markedspladserne ved næste kørsel.
        </p>
        <ul class="term-chips" id="search-terms-list"></ul>
        <form id="search-terms-form">
          <input type="text" id="search-terms-input" placeholder="fx RCF ART 315" required />
          <button type="submit" class="primary">Tilføj</button>
        </form>
        <p class="error-text" id="search-terms-error"></p>
      </div>
    </details>

    <div class="card">
      <div class="controls">
        <input type="text" id="filter-search" placeholder="Filtrér liste efter titel/model..." />
        <button id="reload">Genindlæs</button>
      </div>

      <div class="table-scroll">
        <table id="listings-table">
          <thead>
            <tr>
              <th data-key="classification" scope="col">
                <button type="button">Klassifikation<span class="sort-indicator"></span></button>
              </th>
              <th data-key="model" scope="col">
                <button type="button">Model<span class="sort-indicator"></span></button>
              </th>
              <th data-key="gen" scope="col">
                <button type="button">Gen<span class="sort-indicator"></span></button>
              </th>
              <th data-key="quantity" data-numeric="true" scope="col">
                <button type="button">Antal<span class="sort-indicator"></span></button>
              </th>
              <th data-key="price_per_unit_dkk" data-numeric="true" scope="col">
                <button type="button">Pris/enhed<span class="sort-indicator"></span></button>
              </th>
              <th data-key="source" scope="col">
                <button type="button">Kilde<span class="sort-indicator"></span></button>
              </th>
              <th data-key="title" scope="col">
                <button type="button">Titel<span class="sort-indicator"></span></button>
              </th>
              <th data-key="first_seen" scope="col">
                <button type="button">Først set<span class="sort-indicator"></span></button>
              </th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p id="count-line"></p>
      <p class="error-text" id="error"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // Session lives in an HttpOnly cookie set by the Worker - this page never
    // touches a password or API key, it just relays the stored session token.
    // Auth uses a localStorage token sent as `Authorization: Bearer`, NOT a
    // cookie - frontend (this GitHub Pages site) and the Worker API are on two
    // different registrable domains, and Safari's ITP (and increasingly
    // Chrome) blocks cross-site cookies entirely by default regardless of
    // SameSite. See login.html's comment for the full explanation.
    const CLASSIFICATIONS = ["GODT KØB", "FAIR", "OVERPRISET", "UKENDT"];
    const CLASS_RANK = { "GODT KØB": 0, "FAIR": 1, "OVERPRISET": 2, "UKENDT": 3 };
    let allListings = [];
    let activeClassFilter = null; // classification chip filter (client-side, no refetch)
    let sortKey = null, sortAsc = true; // null = default combined sort (classification, then newest)

    function authHeaders() {
      const token = localStorage.getItem("session_token");
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    async function requireSession() {
      const token = localStorage.getItem("session_token");
      if (!token) {
        window.location.href = "login.html";
        return null;
      }
      const res = await fetch(`${API_BASE}/api/me`, { headers: authHeaders() });
      if (!res.ok) {
        localStorage.removeItem("session_token");
        window.location.href = "login.html";
        return null;
      }
      return res.json();
    }

    async function loadListings() {
      const reloadBtn = document.getElementById("reload");
      reloadBtn.disabled = true;
      reloadBtn.textContent = "Henter...";

      // Always fetches the full set - classification filtering happens
      // client-side via the stats chips (see renderTable), so toggling a
      // filter never needs a refetch and never loses the current sort.
      const res = await fetch(`${API_BASE}/api/listings`, { headers: authHeaders() });

      reloadBtn.disabled = false;
      reloadBtn.textContent = "Genindlæs";

      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke hente data.";
        return;
      }
      const { listings } = await res.json();
      allListings = listings;
      applySort();
      renderStats();
      renderLastUpdated();
      renderTable();
    }

    function applySort() {
      if (sortKey) {
        const th = document.querySelector(`#listings-table th[data-key="${sortKey}"]`);
        const numeric = th?.dataset.numeric === "true";
        allListings.sort((a, b) => {
          const av = a[sortKey], bv = b[sortKey];
          if (numeric) return sortAsc ? (av ?? 0) - (bv ?? 0) : (bv ?? 0) - (av ?? 0);
          return sortAsc
            ? String(av ?? "").localeCompare(String(bv ?? ""))
            : String(bv ?? "").localeCompare(String(av ?? ""));
        });
      } else {
        // Default: best classification first, newest within each group -
        // the point of this tool is surfacing GODT KØB, not server order.
        allListings.sort((a, b) => {
          const rankA = CLASS_RANK[a.classification ?? "UKENDT"] ?? 99;
          const rankB = CLASS_RANK[b.classification ?? "UKENDT"] ?? 99;
          if (rankA !== rankB) return rankA - rankB;
          return String(b.first_seen ?? "").localeCompare(String(a.first_seen ?? ""));
        });
      }
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("#listings-table th[data-key]").forEach((th) => {
        const indicator = th.querySelector(".sort-indicator");
        if (th.dataset.key === sortKey) {
          th.setAttribute("aria-sort", sortAsc ? "ascending" : "descending");
          indicator.textContent = sortAsc ? "▲" : "▼";
        } else {
          th.removeAttribute("aria-sort");
          indicator.textContent = "";
        }
      });
    }

    function isRecent(firstSeen) {
      if (!firstSeen) return false;
      return Date.now() - new Date(firstSeen).getTime() < 24 * 60 * 60 * 1000;
    }

    function renderLastUpdated() {
      const el = document.getElementById("last-updated");
      if (allListings.length === 0) {
        el.textContent = "";
        return;
      }
      const newest = allListings.reduce(
        (max, row) => ((row.first_seen ?? "") > max ? row.first_seen : max),
        allListings[0].first_seen ?? "",
      );
      el.textContent = `Nyeste fund: ${newest.slice(0, 16).replace("T", " ")}`;
    }

    function renderStats() {
      const bar = document.getElementById("stats-bar");
      bar.innerHTML = "";

      const total = document.createElement("button");
      total.type = "button";
      total.className = "stat total" + (activeClassFilter === null ? " active" : "");
      total.innerHTML = `<strong>${allListings.length}</strong> annoncer i alt`;
      total.addEventListener("click", () => {
        activeClassFilter = null;
        renderStats();
        renderTable();
      });
      bar.appendChild(total);

      for (const cls of CLASSIFICATIONS) {
        const count = allListings.filter((row) => (row.classification ?? "UKENDT") === cls).length;
        if (count === 0) continue;
        const stat = document.createElement("button");
        stat.type = "button";
        stat.className = "stat" + (activeClassFilter === cls ? " active" : "");
        stat.dataset.class = cls;
        stat.innerHTML = `<strong>${count}</strong> ${cls}`;
        stat.setAttribute("aria-pressed", String(activeClassFilter === cls));
        stat.addEventListener("click", () => {
          activeClassFilter = activeClassFilter === cls ? null : cls;
          renderStats();
          renderTable();
        });
        bar.appendChild(stat);
      }
    }

    function classificationBadge(classification) {
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.dataset.class = classification;
      badge.textContent = classification;
      return badge;
    }

    function renderTable() {
      const search = document.getElementById("filter-search").value.toLowerCase().trim();
      const tbody = document.querySelector("#listings-table tbody");
      tbody.innerHTML = "";

      const filtered = allListings.filter((row) => {
        if (activeClassFilter && (row.classification ?? "UKENDT") !== activeClassFilter) return false;
        if (!search) return true;
        const haystack = `${row.title ?? ""} ${row.model ?? ""}`.toLowerCase();
        return haystack.includes(search);
      });

      if (filtered.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 8;
        td.className = "empty-state";
        td.textContent = allListings.length === 0 ? "Ingen annoncer endnu." : "Ingen annoncer matcher filteret.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        document.getElementById("count-line").textContent = `${filtered.length} af ${allListings.length} annoncer vist`;
        return;
      }

      for (const row of filtered) {
        const tr = document.createElement("tr");
        const classification = row.classification ?? "UKENDT";

        const classCell = document.createElement("td");
        classCell.dataset.label = "Klassifikation";
        classCell.appendChild(classificationBadge(classification));
        if (isRecent(row.first_seen)) {
          const newBadge = document.createElement("span");
          newBadge.className = "new-badge";
          newBadge.textContent = "NY";
          classCell.appendChild(newBadge);
        }
        tr.appendChild(classCell);

        const priceStr = row.price_per_unit_dkk != null ? `${Math.round(row.price_per_unit_dkk)} kr` : "?";
        const cellDefs = [
          ["Model", (row.model ?? "?").toUpperCase()],
          ["Gen", row.gen ?? "uoplyst"],
          ["Antal", row.quantity ?? 1],
          ["Pris/enhed", priceStr],
          ["Kilde", row.source ?? ""],
        ];
        for (const [label, value] of cellDefs) {
          const cell = document.createElement("td");
          cell.dataset.label = label;
          cell.textContent = value; // textContent, not innerHTML - avoids XSS from scraped content
          tr.appendChild(cell);
        }

        // Title is the primary action (opens the listing) - critique found the
        // separate far-right "Link" column buried the one thing users actually
        // want to do with an interesting row, and it was unreachable at all on
        // mobile without horizontal scrolling.
        const titleCell = document.createElement("td");
        titleCell.dataset.label = "Titel";
        const link = document.createElement("a");
        link.className = "row-link";
        link.href = row.url ?? "#";
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = row.title ?? "";
        titleCell.appendChild(link);
        tr.appendChild(titleCell);

        const seenCell = document.createElement("td");
        seenCell.dataset.label = "Først set";
        seenCell.textContent = (row.first_seen ?? "").slice(0, 16).replace("T", " ");
        tr.appendChild(seenCell);

        tbody.appendChild(tr);
      }

      document.getElementById("count-line").textContent = `${filtered.length} af ${allListings.length} annoncer vist`;
    }

    document.querySelectorAll("#listings-table th[data-key]").forEach((th) => {
      th.querySelector("button").addEventListener("click", () => {
        const key = th.dataset.key;
        sortAsc = sortKey === key ? !sortAsc : true;
        sortKey = key;
        applySort();
        renderTable();
      });
    });

    document.getElementById("filter-search").addEventListener("input", renderTable);
    document.getElementById("reload").addEventListener("click", loadListings);

    document.getElementById("logout").addEventListener("click", async () => {
      await fetch(`${API_BASE}/logout`, { method: "POST", headers: authHeaders() });
      localStorage.removeItem("session_token");
      window.location.href = "login.html";
    });

    // Dynamic search terms ("ønskeseddel") - see search_terms.py/index.ts's
    // /api/search-terms. Editing here is what the scraper's next run will
    // actually search for, instead of requiring a config.yaml edit + redeploy.
    async function loadSearchTerms() {
      const errorEl = document.getElementById("search-terms-error");
      errorEl.textContent = "";
      const res = await fetch(`${API_BASE}/api/search-terms`, { headers: authHeaders() });
      if (!res.ok) {
        errorEl.textContent = "Kunne ikke hente søgetermer.";
        return;
      }
      const { searchTerms } = await res.json();
      const list = document.getElementById("search-terms-list");
      list.innerHTML = "";
      for (const row of searchTerms) {
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(row.term));
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "✕";
        removeBtn.setAttribute("aria-label", `Fjern ${row.term}`);
        removeBtn.title = "Fjern søgeterm";
        removeBtn.addEventListener("click", () => removeSearchTerm(row.term));
        li.appendChild(removeBtn);
        list.appendChild(li);
      }
    }

    async function removeSearchTerm(term) {
      const errorEl = document.getElementById("search-terms-error");
      errorEl.textContent = "";
      const res = await fetch(`${API_BASE}/api/search-terms/${encodeURIComponent(term)}`, {
        method: "DELETE",
        headers: authHeaders(),
      });
      if (!res.ok) {
        errorEl.textContent = "Kunne ikke fjerne søgeterm.";
        return;
      }
      await loadSearchTerms();
    }

    document.getElementById("search-terms-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const input = document.getElementById("search-terms-input");
      const errorEl = document.getElementById("search-terms-error");
      errorEl.textContent = "";
      const term = input.value.trim();
      if (!term) return;

      const res = await fetch(`${API_BASE}/api/search-terms`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...authHeaders() },
        body: JSON.stringify({ term }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.error || "Kunne ikke tilføje søgeterm.";
        return;
      }
      input.value = "";
      await loadSearchTerms();
    });

    // "Kør nu" (run-now trigger), inspired by PLAGG's own webapp trigger
    // button: this page never runs the scraper itself - it POSTs to
    // /api/trigger, which flips a flag in Turso's `control` row that
    // scraper/scraper/trigger_watcher.py (a separate always-running launchd
    // job on the Mac Mini, see make install-launchd-watcher) polls every 15s
    // and acts on. See that file's docstring for why a subprocess, not this
    // Worker, actually runs the scrape.
    let statusPollTimer = null;

    function renderStatusPill(statusText) {
      const pill = document.getElementById("status-pill");
      pill.textContent = statusText || "–";
      pill.className = "status-pill";
      const t = (statusText || "").toLowerCase();
      if (t.includes("kører")) pill.classList.add("busy");
      else if (t.includes("fejl")) pill.classList.add("err");
      else pill.classList.add("ok");
    }

    async function refreshStatus() {
      try {
        const res = await fetch(`${API_BASE}/api/status`, { headers: authHeaders() });
        if (!res.ok) return null;
        const data = await res.json();
        renderStatusPill(data?.status);
        return data;
      } catch {
        return null;
      }
    }

    function startStatusPolling() {
      if (statusPollTimer) return; // already running
      statusPollTimer = setInterval(async () => {
        const data = await refreshStatus();
        if (data && !String(data.status || "").toLowerCase().includes("kører")) {
          stopStatusPolling();
          await loadListings(); // fresh data after a completed run
        }
      }, 3000);
    }
    function stopStatusPolling() {
      if (statusPollTimer) {
        clearInterval(statusPollTimer);
        statusPollTimer = null;
      }
      document.getElementById("run-now-btn").disabled = false;
    }

    // The button's disabled state is only a brief visual animation and is NOT
    // reliable proof a run actually started (a real run takes minutes, and
    // the status field only flips once trigger_watcher.py actually picks up
    // the flag). This banner is independent of the button: shown immediately
    // on click, cleared once polling actually observes status change away
    // from its baseline, or replaced with a warning after a timeout (if no
    // real run ever starts, e.g. trigger_watcher.py isn't running).
    let runBannerWatchTimer = null;
    let runBannerTimeoutId = null;

    function showRunBanner(text, kind) {
      const card = document.getElementById("run-banner-card");
      const el = document.getElementById("run-banner");
      el.textContent = text;
      el.className = `run-banner ${kind || "info"}`;
      card.style.display = "block";
    }
    function hideRunBanner() {
      document.getElementById("run-banner-card").style.display = "none";
    }
    function clearRunBannerWatch() {
      if (runBannerWatchTimer) {
        clearInterval(runBannerWatchTimer);
        runBannerWatchTimer = null;
      }
      if (runBannerTimeoutId) {
        clearTimeout(runBannerTimeoutId);
        runBannerTimeoutId = null;
      }
    }

    document.getElementById("run-now-btn").addEventListener("click", async () => {
      const btn = document.getElementById("run-now-btn");
      btn.disabled = true;

      const baselineStatus = (document.getElementById("status-pill").textContent || "")
        .trim()
        .toLowerCase();
      clearRunBannerWatch();
      showRunBanner("Kørsel sat i gang - opdaterer om lidt...", "info");

      try {
        await fetch(`${API_BASE}/api/trigger`, { method: "POST", headers: authHeaders() });
      } catch {
        // fejl - status-polling viser stadig seneste kendte status
      }
      await refreshStatus();
      startStatusPolling();

      runBannerWatchTimer = setInterval(() => {
        const current = (document.getElementById("status-pill").textContent || "")
          .trim()
          .toLowerCase();
        if (current && current !== baselineStatus) {
          hideRunBanner();
          clearRunBannerWatch();
        }
      }, 1000);

      // trigger_watcher.py polls every 15s (see POLL_INTERVAL_S) - 45s gives
      // a full poll interval plus network/Turso latency margin before
      // warning that nothing seems to have picked up the trigger.
      runBannerTimeoutId = setTimeout(() => {
        showRunBanner(
          "Ingen bekræftelse endnu på at kørslen er startet - tjek at " +
            "trigger_watcher.py kører (make install-launchd-watcher).",
          "warn",
        );
        if (runBannerWatchTimer) {
          clearInterval(runBannerWatchTimer);
          runBannerWatchTimer = null;
        }
      }, 45000);
    });

    (async () => {
      const me = await requireSession();
      if (!me) return;
      document.getElementById("whoami").textContent = me.username;
      await loadListings();
      await loadSearchTerms();
      const status = await refreshStatus();
      if (status && String(status.status || "").toLowerCase().includes("kører")) {
        document.getElementById("run-now-btn").disabled = true;
        startStatusPolling();
      }
    })();
  </script>
</body>
</html>
