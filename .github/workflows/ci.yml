name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (ruff + tests + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper-core
        run: pip install -e "packages/scraper-core[dev]"

      - name: Install scraper (RCF ART / Yamaha DXR PA-speaker monitor)
        run: pip install -e "scraper[dev]"

      - name: Ruff lint
        run: ruff check packages/scraper-core scraper

      - name: Unit tests (delta-sync logic, mocked Turso client)
        run: pytest packages/scraper-core/tests -q

      - name: Import smoke test
        run: python -c "import scraper_core, scraper.main; print('import OK')"

      - name: Local SQLite schema + plumbing smoke test
        # No TURSO_* credentials set here on purpose: this exercises the
        # graceful local-only fallback (settings, LocalStore, schema creation)
        # without needing a Turso account in CI. RCF_CONFIG_PATH points at a
        # fixture with all five sources disabled - this project's real sources
        # are live, rate-limited/bot-protected commercial marketplaces (Reverb,
        # Thomann, Kleinanzeigen, Blocket, DBA), not a stable public test API
        # like the original dummy example, so CI must never hit them directly.
        run: |
          rm -f data/ci-smoke.db
          LOCAL_SQLITE_PATH=./data/ci-smoke.db RCF_CONFIG_PATH=./config.ci-smoke.yaml python -m scraper.main

  worker:
    name: Worker (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: "Unit tests (auth: password hash + session token signing)"
        run: npx vitest run

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
